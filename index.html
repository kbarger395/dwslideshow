<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dwslideshow</title>
<link href="css/bootstrap-5.3.8.css" rel="stylesheet" type="text/css">
<link href="styles.css" rel="stylesheet" type="text/css">
</head>

<body>
<article>
	<header class="header_top">Flower Gallery</header>
  <div id="carouselExampleIndicators1" class="carousel slide" data-bs-ride="carousel">
    <ol class="carousel-indicators">
      <li data-bs-target="#carouselExampleIndicators1" data-bs-slide-to="0" class="active"></li>
      <li data-bs-target="#carouselExampleIndicators1" data-bs-slide-to="1"></li>
      <li data-bs-target="#carouselExampleIndicators1" data-bs-slide-to="2"></li>
		<li data-bs-target="#carouselExampleIndicators1" data-bs-slide-to="3"></li>
		<li data-bs-target="#carouselExampleIndicators1" data-bs-slide-to="4"></li>
    </ol>
    <div class="carousel-inner" role="listbox">
  <div class="carousel-inner" role="listbox">
  
  <div class="carousel-item active">
    <img class="d-block mx-auto" src="images/flower1.jpg" alt="First slide">
  </div>

  <div class="carousel-item">
    <img class="d-block mx-auto" src="images/flower2.jpg" alt="Second slide">
  </div>

  <div class="carousel-item">
    <img class="d-block mx-auto" src="images/flower3.jpg" alt="Third slide">
  </div>

  <div class="carousel-item">
    <img class="d-block mx-auto" src="images/flower4.jpg" alt="Fourth slide">
  </div>

  <div class="carousel-item">
    <img class="d-block mx-auto" src="images/flower5.jpg" alt="Fifth slide">
  </div>

</div>
      </div>
    <a class="carousel-control-prev" href="#carouselExampleIndicators1" role="button" data-bs-slide="prev"> <span class="carousel-control-prev-icon" aria-hidden="true"></span> <span class="visually-hidden">Previous</span> </a> <a class="carousel-control-next" href="#carouselExampleIndicators1" role="button" data-bs-slide="next"> <span class="carousel-control-next-icon" aria-hidden="true"></span> <span class="visually-hidden">Next</span> </a> </div>
</article>
	
<article>
	    <footer class="footer_bottom">
        © 2026 Flower Gallery | Made by Kaileigh Barger
    </footer>

	</article>
